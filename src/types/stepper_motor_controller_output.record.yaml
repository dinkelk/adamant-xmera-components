---
#  /*! structure containing the stepper motor controller algorithm output */
#  typedef struct {
#      MotorStepCommandMsgPayload motorStepCommandOut; /*!< Output msg for the number of commanded motor steps */
#      bool writeOutputMessage;                        /*!< Indicator whether or not output message should be written */
#  } StepperMotorControllerOutput;
description: Output data produced by the stepper motor controller algorithm
fields:
  - name: Motor_Step_Command_Out
    type: Motor_Step_Command.T
    description: Commanded motor step message payload
  - name: Write_Output_Message
    type: Interfaces.Unsigned_8
    format: U8
    description: Flag indicating whether the output message must be written (1 = True, 0 = False)
