---
#  /*! @brief Abstracted star tracker measurement input. */
#  typedef struct {
#      float timeTag;         /*!< Time tag of star tracker measurement (s) */
#      float MRP_BdyInrtl[3]; /*!< MRP attitude of body w.r.t. inertial frame */
#      float omega_BN_B[3];   /*!< Angular velocity of body w.r.t. inertial, body frame (rad/s) */
#  } STAttInput_c;
fields:
  - name: Time_Tag
    type: Short_Float
    format: F32
    description: "[s] Time tag of star tracker measurement"
  - name: Mrp_Bdy_Inrtl
    type: Packed_F32x3.T
    description: "MRP attitude of body w.r.t. inertial frame"
  - name: Omega_Bn_B
    type: Packed_F32x3.T
    description: "[rad/s] Angular velocity of body w.r.t. inertial, body frame components"
