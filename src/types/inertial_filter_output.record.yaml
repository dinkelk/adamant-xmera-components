---
#  /*! @brief Abstracted inertial filter output. */
#  typedef struct {
#      double timeTag; /*!< Time tag of filter solution (s) */
#      int numObs;     /*!< Number of observations used in filter update */
#  } InertialFilterOutput_c;
fields:
  - name: Time_Tag
    type: Long_Float
    format: F64
    description: "[s] Time tag of filter solution"
  - name: Num_Obs
    type: Interfaces.Integer_32
    format: I32
    description: "[-] Number of observations used in filter update"
