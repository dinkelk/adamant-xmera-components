---
#  /*! @brief Star tracker body-frame attitude output from the platform-to-body conversion algorithm */
#  typedef struct {
#      uint64_t timeTag;    /*!< [ns] Time tag associated with measurement */
#      float sigma_BN[3];   /*!< [-] MRP from inertial to body frame */
#      float omega_BN_B[3]; /*!< [rad/s] Body-frame angular velocity w.r.t. inertial */
#  } StAttitudeOutput;
fields:
  - name: Time_Tag
    type: Interfaces.Unsigned_64
    format: U64
    description: "[ns] Time tag associated with measurement"
  - name: Mrp_Bdy_Inrtl
    type: Packed_F32x3.T
    description: "[-] MRP from inertial to body frame"
  - name: Omega_Bn_B
    type: Packed_F32x3.T
    description: "[rad/s] Body-frame angular velocity w.r.t. inertial"
