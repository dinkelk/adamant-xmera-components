---
#  /*! @brief Structure used to define the output definition for translation guidance*/
#  typedef struct {
#      double timeTag;       //!< [s]   Current vehicle time-tag associated with measurements
#      double r_BN_N[3];     //!< [m]   Current inertial spacecraft position vector in inertial frame N components
#      double v_BN_N[3];     //!< [m/s] Current inertial velocity of the spacecraft in inertial frame N components
#      float vehAccumDV[3];  //!< [m/s] Total accumulated delta-velocity for s/c
#  } NavTransMsgF32Payload;
fields:
  - name: Time_Tag
    type: Long_Float
    format: F64
    description: "[s] Current vehicle time-tag associated with measurements"
  - name: R_Bn_N
    type: Packed_F64x3.T
    description: "[m] Current inertial spacecraft position vector in inertial frame N components"
  - name: V_Bn_N
    type: Packed_F64x3.T
    description: "[m/s] Current inertial velocity of the spacecraft in inertial frame N components"
  - name: Vehaccumdv
    type: Packed_F32x3.T
    description: "[m/s] Total accumulated delta-velocity for s/c"
