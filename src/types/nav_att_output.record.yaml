---
#  /*! @brief Abstracted navigation attitude output. */
#  typedef struct {
#      double timeTag;        /*!< Time tag of navigation solution (s) */
#      float sigma_BN[3];     /*!< MRP attitude of body w.r.t. inertial frame */
#      float omega_BN_B[3];   /*!< Angular velocity of body w.r.t. inertial, body frame (rad/s) */
#      float vehSunPntBdy[3]; /*!< Sun direction unit vector in body frame */
#  } NavAttOutput_c;
fields:
  - name: Time_Tag
    type: Long_Float
    format: F64
    description: "[s] Time tag of navigation solution"
  - name: Sigma_Bn
    type: Packed_F32x3.T
    description: "MRP attitude of body w.r.t. inertial frame"
  - name: Omega_Bn_B
    type: Packed_F32x3.T
    description: "[rad/s] Angular velocity of body w.r.t. inertial, body frame components"
  - name: Veh_Sun_Pnt_Bdy
    type: Packed_F32x3.T
    description: "Sun direction unit vector in body frame"
