---
description: MIMU majority vote algorithm detects faulted IMUs by comparing individual angular velocity measurements and computes a fault-excluded average.
execution: passive
init:
  description: Initializes the MIMU majority vote algorithm.
connectors:
  - description: Run the algorithm up to the current time.
    type: Tick.T
    kind: recv_sync
  - description: The system time is retrieved via this connector.
    return_type: Sys_Time.T
    kind: get
  - description: Fetch a data product item from the database.
    type: Data_Product_Fetch.T
    return_type: Data_Product_Return.T
    kind: request
  - description: The data product invoker connector
    type: Data_Product.T
    kind: send
  - description: The event send connector
    type: Event.T
    kind: send
  - description: The parameter update connector.
    type: Parameter_Update.T
    kind: modify
