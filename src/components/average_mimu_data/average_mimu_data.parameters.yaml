---
description: Parameters for the Average Mimu Data component
parameters:
  - name: Time_Delta
    description: "[s] Allowable time difference from latest measurement for averaging window"
    type: Packed_F32.T
    default: "(Value => 0.0)"
  - name: Dcm_Pltf_To_Bdy
    description: "[-] Direction cosine matrix from platform frame to body frame (3x3 row-major, 9 elements)"
    type: Packed_F32x9.T
    default: "[others => 0.0]"
  - name: Gyro_Scale
    description: "[rad/s/count] conversion factor from raw gyro I32 counts to rad/s"
    type: Packed_F32.T
    default: "(Value => 3.2513631e-08)"
  - name: Accel_Scale
    description: "[m/s^2/count] conversion factor from raw accelerometer I32 counts to m/s^2"
    type: Packed_F32.T
    default: "(Value => 7.4505806e-08)"
