---
description: Parameters for the Sun Search component
parameters:
  - name: Spacecraft_Inertia
    description: "[kg m^2] Spacecraft principal inertia terms about point B in body frame"
    type: Principal_Inertias.T
    default: "(Ixx_Pnt_B_B => 0.0, Iyy_Pnt_B_B => 0.0, Izz_Pnt_B_B => 0.0)"
  # TODO, need reasonable defaults here.
  - name: Slew_1_Properties
    description: Properties for the first slew maneuver (time, angle, max rate, max torque, rotation axis)
    type: Slew_Properties.T
    default: "(Slew_Time => 0.0, Slew_Angle => 0.0, Slew_Max_Rate => 0.0, Slew_Max_Torque => 0.0, Slew_Rot_Axis => 1)"
  - name: Slew_2_Properties
    description: Properties for the second slew maneuver (time, angle, max rate, max torque, rotation axis)
    type: Slew_Properties.T
    default: "(Slew_Time => 0.0, Slew_Angle => 0.0, Slew_Max_Rate => 0.0, Slew_Max_Torque => 0.0, Slew_Rot_Axis => 2)"
  - name: Slew_3_Properties
    description: Properties for the third slew maneuver (time, angle, max rate, max torque, rotation axis)
    type: Slew_Properties.T
    default: "(Slew_Time => 0.0, Slew_Angle => 0.0, Slew_Max_Rate => 0.0, Slew_Max_Torque => 0.0, Slew_Rot_Axis => 3)"
