---
description: Navigation aggregation algorithm combines multiple navigation message sources into single aggregated attitude and translational navigation messages.
execution: passive
init:
  description: Initializes the navigation aggregation algorithm with configuration indices.
  parameters:
    - name: Att_Time_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for attitude time tag
    - name: Trans_Time_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for translation time tag
    - name: Att_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for inertial MRP attitude
    - name: Rate_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for attitude rate
    - name: Pos_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for inertial position
    - name: Vel_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for inertial velocity
    - name: Dv_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for accumulated DV
    - name: Sun_Idx
      type: Interfaces.Unsigned_32
      description: Index of message to use for sun pointing vector
    - name: Att_Msg_Count
      type: Interfaces.Unsigned_32
      description: Total number of attitude messages available as inputs
    - name: Trans_Msg_Count
      type: Interfaces.Unsigned_32
      description: Total number of translation messages available as inputs
connectors:
  - description: Run the aggregation algorithm up to the current time.
    type: Tick.T
    kind: recv_sync
  - description: Fetch a data product item from the database.
    type: Data_Product_Fetch.T
    return_type: Data_Product_Return.T
    kind: request
  - description: The data product invoker connector
    type: Data_Product.T
    kind: send
