---
description: Ephemeris to navigation converter algorithm converts ephemeris messages to navigation translation messages.
execution: passive
init:
  description: Initializes the ephemeris navigation converter algorithm.
connectors:
  - description: Run the algorithm up to the current time.
    type: Tick.T
    kind: recv_sync
  - description: Fetch a data product item from the database.
    type: Data_Product_Fetch.T
    return_type: Data_Product_Return.T
    kind: request
  - description: The data product invoker connector
    type: Data_Product.T
    kind: send
