---
description: Parameters for the Stepper Motor Controller component
parameters:
  - name: Theta_Max
    description: "[rad] Upper actuation limit for the motor angle"
    type: Packed_F32.T
    default: "(Value => 6.2831853)"
  - name: Theta_Min
    description: "[rad] Lower actuation limit for the motor angle"
    type: Packed_F32.T
    default: "(Value => -6.2831853)"
  - name: Step_Angle
    description: "[rad] Motor step angle for each commanded step"
    type: Packed_F32.T
    default: "(Value => 0.0174532925)"
  - name: Step_Time
    description: "[s] Time required for the motor to complete a single step"
    type: Packed_F32.T
    default: "(Value => 1.0)"
